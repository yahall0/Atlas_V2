name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: backend
          JWT_SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: ""
          MONGO_URL: ""
        run: |
          pytest backend/tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 backend/ --max-line-length=120 --exclude=__pycache__ --per-file-ignores='backend/app/ingestion/*:E221,E272,W605 backend/app/db/crud_fir.py:F401 backend/app/db/session.py:F841,W391'

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
