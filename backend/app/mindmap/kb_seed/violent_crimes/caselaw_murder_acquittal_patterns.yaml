    priority: critical
    title_en: "Recovery under BSA S.8 — Defective Discovery Panchnamas"
    description_md: |
      The Supreme Court in **Pulukuri Kotayya v. King-Emperor (AIR 1947 PC 67)**
      — followed throughout the BNS regime — restricts admissibility under
      what is now BSA S.8 (formerly Indian Evidence Act S.27) to the
      "fact discovered" portion only, not the entire confessional statement.

      Recurring acquittal patterns flagged by Gujarat HC:

      - **Pre-dictated panchnamas** where the recovered location is recorded
        before the accused points it out — fatal to admissibility
        (*State of Gujarat v. Adam Hajibhai*, GHC 2019).
      - **Panchas not present at the actual moment of pointing out**, only
        signing back at the police station — defence routinely succeeds in
        challenging the seizure as got-up.
      - **No contemporaneous photo / video** of the accused at the recovery
        point — the bench infers the recovery may have been planted.

      **Mitigation**: video-record from the moment the accused leaves the
      vehicle to the moment the article is taken into possession; capture
      the panchas' faces in the same frame; preserve the SD card hash.
    legal_basis_citations:
      - framework: BSA
        section: "8"
        source_authority: "Bharatiya Sakshya Adhiniyam 2023"
      - case_citation: "Pulukuri Kotayya v. King-Emperor, AIR 1947 PC 67"
        source_authority: "Privy Council (followed by Supreme Court)"
    requires_disclaimer: true
    procedural_metadata:
