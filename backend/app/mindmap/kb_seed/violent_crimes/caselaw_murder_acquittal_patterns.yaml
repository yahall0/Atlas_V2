# Layer 3 — Case Law Intelligence (Murder Acquittal Patterns)
#
# Each node here distils what courts have actually ruled about investigation
# quality in murder cases — the recurring evidentiary failures that drive
# acquittals, the standards courts have set for chain-of-custody, and the
# precedents an IO and PP need to anticipate.
#
# Layer 3 differs from Layer 2 in authority: Layer 2 is what good practice
# looks like; Layer 3 is what courts have *required* and *punished omission
# of*. Authority is graded by court (SC > HC-Gujarat > HC-other > District).
# Cadence is continuous: as new judgments issue, the extraction pipeline
# proposes new nodes here for human review.

