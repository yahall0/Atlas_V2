    priority: high
    title_en: "BSA S.63 Certificate — Mandatory for Electronic Evidence"
    description_md: |
      **Anvar P.V. v. P.K. Basheer (2014) 10 SCC 473**, reaffirmed in
      **Arjun Panditrao Khotkar v. Kailash Kushanrao Gorantyal (2020) 7 SCC 1**,
      held that a certificate under (then) S.65B Evidence Act / now S.63 BSA
      is a **mandatory pre-condition** for admissibility of electronic
      evidence (CCTV, CDR, dump, mobile data extraction). The certificate
      must come from the person in control of the originating device at the
      relevant time, not from the IO who later seized it.

      Recurring failures in Gujarat district courts:

      - Certificate signed by the IO instead of the CCTV operator / nodal
        officer of the telecom provider.
      - Certificate dated after the trial begins — the Supreme Court has
        held the certificate must be obtained at the time of producing the
        electronic record, not at trial-stage as an afterthought.
      - SHA-256 hash of the original media not noted on the certificate,
        making it impossible to prove the trial-stage copy is identical.

      **Action**: collect the S.63 BSA certificate and the SHA-256 hash on
      the same day the electronic record is seized. Attach to the seizure
      panchnama, not as a stand-alone afterthought.
    legal_basis_citations:
      - framework: BSA
        section: "63"
        source_authority: "Bharatiya Sakshya Adhiniyam 2023"
      - case_citation: "Anvar P.V. v. P.K. Basheer, (2014) 10 SCC 473"
        source_authority: "Supreme Court of India"
