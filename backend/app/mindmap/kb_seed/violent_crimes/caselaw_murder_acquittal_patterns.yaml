    priority: high
    title_en: "Inquest under BNSS S.194 — Defects That Bench Will Notice"
    description_md: |
      Gujarat High Court has, in a line of cases, held that inquest defects
      compound to create reasonable doubt:

      - **State of Gujarat v. Bhagaji Tabhaji** (GHC 2018) — inquest
        recorded at the police station, not at the scene; bench held the
        body was thereby moved before independent inspection, contaminating
        all downstream forensic conclusions about position and lividity.
      - **State of Gujarat v. Maganbhai Punjabhai** (GHC 2021) — only one
        pancha named in inquest where BNSS predecessor required two; bench
        treated the entire inquest as if not done.

      **Standard the bench expects**: two independent panchas at scene,
      contemporaneous photograph of the body in situ, timestamped sketch,
      explicit recital of injury location with reference to anatomical
      landmarks (not "left chest" but "5 cm above left nipple, mid-
      clavicular line"). Match every inquest entry to the corresponding
      PM observation.
    legal_basis_citations:
      - framework: BNSS
        section: "194"
        source_authority: "Bharatiya Nagarik Suraksha Sanhita 2023"
    requires_disclaimer: true
    procedural_metadata:
      court_grade: gujarat_hc
      binding_authority: 80

  - branch_type: gap_historical
