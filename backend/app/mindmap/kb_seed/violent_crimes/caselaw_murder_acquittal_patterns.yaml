    priority: medium
    title_en: "Delay in FIR — Sharad Birdhichand and the Explanation Standard"
    description_md: |
      **Sharad Birdhichand Sarda v. State of Maharashtra (1984) 4 SCC 116**
      and **Thulia Kali v. State of Tamil Nadu (1973) 1 SCC 9** establish
      the rule: any unexplained delay between commission of the offence
      and lodging of the FIR is a **fatal infirmity** unless the
      prosecution offers a satisfactory, contemporaneous explanation
      recorded in the case diary.

      Acceptable explanations the Supreme Court has approved:

      - Informant first taking the victim to hospital (medical priority).
      - Remoteness of the police station (note kilometre distance).
      - Communal tension preventing immediate approach to the station.

      Explanations the Court has rejected:

      - Awaiting "approval" from senior officers.
      - Internal jurisdictional disputes over which station should register.
      - "Investigation needed before FIR" — explicitly held impermissible
        under Lalita Kumari v. State of UP (2014) 2 SCC 1.

      **Action**: the case diary must contain the explanation contemporaneously,
      not be added retrospectively in the chargesheet.
    legal_basis_citations:
      - case_citation: "Sharad Birdhichand Sarda v. State of Maharashtra, (1984) 4 SCC 116"
        source_authority: "Supreme Court of India"
      - case_citation: "Thulia Kali v. State of Tamil Nadu, (1973) 1 SCC 9"
        source_authority: "Supreme Court of India"
      - case_citation: "Lalita Kumari v. State of UP, (2014) 2 SCC 1"
        source_authority: "Supreme Court of India (Constitution Bench)"
    requires_disclaimer: true
