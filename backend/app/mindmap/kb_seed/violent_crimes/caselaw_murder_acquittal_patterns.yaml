    priority: high
    title_en: "Hostile Witness — Why S.183 BNSS Statement Matters at Trial"
    description_md: |
      Witnesses turning hostile remains the single largest reported reason
      for acquittal in Indian murder trials. Per the **Law Commission's
      198th Report** and **Mahender Chawla v. Union of India (2019) 14
      SCC 615**, the prophylactic mechanism is the Section 164 CrPC /
      Section 183 BNSS statement recorded before a Judicial Magistrate.

      A S.183 statement is **substantive evidence** under the BNS regime
      (unlike a S.180 police statement which is only usable for
      contradiction under BSA S.145). When the witness later resiles at
      trial, the prosecution can confront with the S.183 statement and the
      court is empowered to act upon the prior sworn version under
      **State of Delhi v. Shri Ram Lohia (1960) 2 SCR 821**.

      **Action**: identify the two or three witnesses most exposed to
      pressure (family of accused, neighbours, weak villagers) within the
      first week of investigation and apply for their S.183 examination
      before the local Magistrate; do not wait for trial-stage hostility.
    legal_basis_citations:
      - framework: BNSS
        section: "183"
        source_authority: "Bharatiya Nagarik Suraksha Sanhita 2023"
      - case_citation: "Mahender Chawla v. Union of India, (2019) 14 SCC 615"
        source_authority: "Supreme Court of India"
    requires_disclaimer: true
    procedural_metadata:
      court_grade: supreme_court
      binding_authority: 100

