    title_en: "Last-Seen Doctrine — Time-Gap Beyond Reasonable Limits"
    description_md: |
      The Supreme Court has repeatedly held that the last-seen-together
      circumstance loses its evidentiary force when the time-gap between
      "last seen" and "found dead" is large enough that intervention by a
      third party becomes possible.

      In **Bodhraj v. State of J&K (2002) 8 SCC 45** and reaffirmed in
      **Anjan Kumar Sarma v. State of Assam (2017) 14 SCC 359**, the Court
      observed that where the time-gap exceeds what is reasonable in the
      facts, the prosecution must additionally prove (i) the accused had
      no opportunity to leave, or (ii) the body was found in a place under
      the accused's exclusive control. Failure on both renders the last-
      seen circumstance "weak and not sufficient by itself."

      **What the IO must record**: exact time-stamp of the last sighting
      (CDR / CCTV corroboration), the exact estimated time of death from
      PM, and an explicit chain reasoning why the intervening interval
      excludes third-party access.
    legal_basis_citations:
      - case_citation: "Bodhraj v. State of J&K, (2002) 8 SCC 45"
        source_authority: "Supreme Court of India"
      - case_citation: "Anjan Kumar Sarma v. State of Assam, (2017) 14 SCC 359"
        source_authority: "Supreme Court of India"
    requires_disclaimer: true
    procedural_metadata:
