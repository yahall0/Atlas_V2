version: "3.9"

# Production override for single-EC2 demo deployment.
# Usage: docker compose -f docker-compose.yml -f infrastructure/aws-demo/docker-compose.prod.yml up -d
#
# Key differences from base compose:
# - Internal services (db/redis/mongo/prometheus/mlflow/labelstudio) no longer bind to host ports
# - backend + frontend bind to 127.0.0.1 only; nginx on the host proxies public traffic
# - Env is read from ./.env (copy from infrastructure/aws-demo/.env.prod.example)

services:
  backend:
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MONGO_URL=${MONGO_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_EXPIRE_MINUTES=${JWT_ACCESS_EXPIRE_MINUTES:-30}
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - FASTTEXT_MODEL_PATH=/app/models/lid.176.bin
      - TRANSFORMERS_CACHE=/app/models/hf_cache
      - HF_HUB_CACHE=/app/models/hf_cache
      - INDIC_BERT_MODEL=google/muril-base-cased
      - INDIC_BERT_CHECKPOINT=
      - ZERO_SHOT_MODEL=MoritzLaurer/mDeBERTa-v3-base-mnli-xnli
      - ZERO_SHOT_THRESHOLD=0.20

  frontend:
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL}/api

  db:
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  redis:
    ports: []

  mongodb:
    ports: []

  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${PUBLIC_URL}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

  labelstudio:
    ports: []

  mlflow:
    ports: []
