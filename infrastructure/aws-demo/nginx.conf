# Atlas_V2 demo reverse proxy.
# Install to /etc/nginx/sites-available/atlas and symlink to sites-enabled.
# Replace __SERVER_NAME__ with the EC2 public DNS / Elastic IP / domain at deploy time.
# After HTTP is verified, run: certbot --nginx -d <domain>

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    client_max_body_size 50M;  # PDFs (FIRs/chargesheets) can be large

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # OCR + inference can take time
        proxy_send_timeout 300s;
    }

    # Prometheus metrics scraped by backend -- direct expose for health checks
    location = /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    # Grafana (served under sub-path — GF_SERVER_SERVE_FROM_SUB_PATH=true).
    # No trailing slash on proxy_pass: we must forward /grafana/... unchanged.
    location /grafana/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Grafana live/websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js (everything else)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR / websocket for streaming UI
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
