[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:redis]
command=redis-server --bind 127.0.0.1
autostart=true
autorestart=true

[program:mongodb]
command=mongod --dbpath /data/db --bind_ip 127.0.0.1
user=mongodb
autostart=true
autorestart=true

[program:postgres]
command=/usr/lib/postgresql/14/bin/postgres -D /var/lib/postgresql/14/main -c config_file=/etc/postgresql/14/main/postgresql.conf
user=postgres
autostart=true
autorestart=true

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true

[program:backend]
command=/opt/venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000
directory=/app/backend
environment=DATABASE_URL="postgresql://atlas:atlaspass@127.0.0.1:5432/atlas_db",REDIS_URL="redis://127.0.0.1:6379",MONGO_URL="mongodb://127.0.0.1:27017"
autostart=true
autorestart=true
startsecs=5

[program:frontend]
command=npm start
directory=/app/frontend
environment=PORT="3000",NEXT_PUBLIC_API_URL=""
autostart=true
autorestart=true