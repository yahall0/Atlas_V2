[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx_error.log

[program:backend]
command=/usr/local/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level info
directory=/app/backend
environment=DATABASE_URL="postgresql://localhost:5432/atlas_db",REDIS_URL="redis://localhost:6379",MONGO_URL="mongodb://localhost:27017",PYTHONUNBUFFERED=1
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/backend.log
stderr_logfile=/var/log/supervisor/backend_error.log

[program:frontend]
command=/usr/bin/npm start
directory=/app/frontend
environment=PORT=3000,NEXT_PUBLIC_API_URL=""
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/frontend.log
stderr_logfile=/var/log/supervisor/frontend_error.log